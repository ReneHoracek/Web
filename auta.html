<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nabídka aut | AutoDílna Novák</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <div class="logo"><span class="logo-dot"></span>AutoDílna <span>Novák</span></div>
            <nav>
                <a href="index.html">Domů</a>
                <a href="auta.html" class="active">Autobazar</a>
                <a href="index.html#kontakt">Kontakt</a>
            </nav>
        </div>
    </header>

    <section class="section page-top">
        <div class="container">
            <div class="page-header">
                <div>
                    <h1 class="section-title text-left">Aktuální nabídka vozů</h1>
                    <p id="car-count">Načítám...</p>
                </div>
                <div class="filters">
                    <select id="palivo-filter" class="filter-select">
                        <option value="vse">Všechna paliva</option>
                        <option value="Benzín">Benzín</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Elektro">Elektro</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                    <select id="cena-sort" class="filter-select">
                        <option value="výchozí">Řadit dle ceny</option>
                        <option value="vzestupne">Od nejlevnějšího</option>
                        <option value="sestupne">Od nejdražšího</option>
                    </select>
                </div>
            </div>

            <div id="car-grid" class="grid car-grid"></div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
